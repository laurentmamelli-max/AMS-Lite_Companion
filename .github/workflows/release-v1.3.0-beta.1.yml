name: Publier v1.3.0-beta.1

on:
  workflow_dispatch:
  push:
    branches:
      - agent/native-integrated-panel
    paths:
      - ".github/workflows/release-v1.3.0-beta.1.yml"

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'laurentmamelli-max/AMS-Lite_Companion'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Tester le moteur
        run: python3 -m unittest -v test_companion.py
      - name: Construire l’application universelle
        run: bash Construire_Application_macOS.command
      - name: Vérifier le paquet
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/AMS Lite Companion.app"
          lipo -archs "dist/AMS Lite Companion.app/Contents/MacOS/AMS-Lite-Companion" | grep -q arm64
          lipo -archs "dist/AMS Lite Companion.app/Contents/MacOS/AMS-Lite-Companion" | grep -q x86_64
      - name: Publier la bêta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.3.0-beta.1 >/dev/null 2>&1; then
            echo "La release v1.3.0-beta.1 existe déjà."
            exit 0
          fi
          gh release create v1.3.0-beta.1 \
            "dist/AMS-Lite-Companion-1.3.0-macOS.zip#Application macOS universelle bêta" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "AMS Lite Companion v1.3.0-beta.1" \
            --notes-file - <<'EOF'
          ## AMS Lite Companion v1.3.0-beta.1

          Première bêta du panneau Companion natif lié à Bambu Studio officiel.

          ### Nouveautés

          - panneau macOS natif accolé à Bambu Studio ;
          - tableau compact intégré avec WebKit, sans navigateur obligatoire ;
          - suivi de la position de la fenêtre Bambu Studio ;
          - panneau masquable ou déplaçable librement ;
          - affichage des bobines, de la passerelle et de l’historique ;
          - Bambu Studio officiel reste intact et signé ;
          - conservation des niveaux et de l’historique des versions précédentes.

          ### Installation

          1. Téléchargez `AMS-Lite-Companion-1.3.0-macOS.zip`.
          2. Quittez Companion et Bambu Studio.
          3. Décompressez l’archive et remplacez l’application dans `/Applications`.
          4. Effectuez un clic droit sur l’application puis choisissez **Ouvrir**.

          Il s’agit d’une préversion. Signalez tout problème de positionnement du panneau dans la PR #5.

          Projet communautaire non officiel, sans affiliation avec Bambu Lab.
          EOF

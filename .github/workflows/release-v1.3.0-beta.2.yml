name: Publier v1.3.0-beta.2

on:
  workflow_dispatch:
  push:
    branches:
      - agent/native-integrated-panel
    paths:
      - ".github/workflows/release-v1.3.0-beta.2.yml"

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'laurentmamelli-max/AMS-Lite_Companion'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Tester le moteur
        run: python3 -m unittest -v test_companion.py
      - name: Construire l’application universelle
        run: bash Construire_Application_macOS.command
      - name: Vérifier le paquet
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/AMS Lite Companion.app"
          lipo -archs "dist/AMS Lite Companion.app/Contents/MacOS/AMS-Lite-Companion" | grep -q arm64
          lipo -archs "dist/AMS Lite Companion.app/Contents/MacOS/AMS-Lite-Companion" | grep -q x86_64
      - name: Publier la bêta corrigée
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.3.0-beta.2 >/dev/null 2>&1; then
            echo "La release v1.3.0-beta.2 existe déjà."
            exit 0
          fi
          gh release create v1.3.0-beta.2 \
            "dist/AMS-Lite-Companion-1.3.0-macOS.zip#Application macOS universelle bêta 2" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "AMS Lite Companion v1.3.0-beta.2" \
            --notes-file - <<'EOF'
          ## AMS Lite Companion v1.3.0-beta.2

          Correctif de connexion pour la bêta du panneau natif.

          ### Corrections

          - suppression de l’abonnement MQTT au canal `request` refusé par certains firmwares A1 mini ;
          - connexion stable conservée sur le canal `report` ;
          - récupération des états `RUNNING`, `FINISH` et de la progression rétablie ;
          - ancien travail bloqué remplacé sans déduction lorsqu’un nouvel identifiant de tâche apparaît ;
          - passage automatique au nouveau `.gcode.3mf` détecté ;
          - correspondance A1–A4 enregistrée utilisée explicitement.

          ### Installation

          1. Téléchargez `AMS-Lite-Companion-1.3.0-macOS.zip`.
          2. Quittez Companion et Bambu Studio.
          3. Remplacez l’application dans `/Applications`.
          4. Effectuez un clic droit puis choisissez **Ouvrir**.
          5. Lancez une nouvelle petite impression pour valider la reconnexion.

          Les niveaux et l’historique existants sont conservés.

          Projet communautaire non officiel, sans affiliation avec Bambu Lab.
          EOF

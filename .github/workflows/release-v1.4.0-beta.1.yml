name: Publier v1.4.0-beta.1

on:
  workflow_dispatch:
  push:
    branches:
      - agent/automatic-ams-mapping
    paths:
      - ".github/workflows/release-v1.4.0-beta.1.yml"

permissions:
  contents: write

jobs:
  release:
    if: github.repository == 'laurentmamelli-max/AMS-Lite_Companion'
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Tester le moteur et l’association AMS
        run: python3 -m unittest -v test_companion.py
      - name: Construire l’application universelle
        run: bash Construire_Application_macOS.command
      - name: Vérifier le paquet
        run: |
          codesign --verify --deep --strict --verbose=2 "dist/AMS Lite Companion.app"
          lipo -archs "dist/AMS Lite Companion.app/Contents/MacOS/AMS-Lite-Companion" | grep -q arm64
          lipo -archs "dist/AMS Lite Companion.app/Contents/MacOS/AMS-Lite-Companion" | grep -q x86_64
      - name: Publier la bêta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v1.4.0-beta.1 >/dev/null 2>&1; then
            echo "La release v1.4.0-beta.1 existe déjà."
            exit 0
          fi
          gh release create v1.4.0-beta.1 \
            "dist/AMS-Lite-Companion-1.4.0-macOS.zip#Application macOS universelle bêta 1" \
            --target "$GITHUB_SHA" \
            --prerelease \
            --title "AMS Lite Companion v1.4.0-beta.1" \
            --notes-file - <<'EOF'
          ## AMS Lite Companion v1.4.0-beta.1

          Première bêta de l’association AMS intelligente et sécurisée.

          ### Nouveautés

          - lecture en temps réel des bobines A1–A4 depuis le canal MQTT `report` ;
          - association des filaments par matière, couleur et identité de bobine ;
          - résolution un-à-un des projets multicolores ;
          - confirmation interactive lorsque deux bobines sont possibles ;
          - blocage des matières incompatibles ;
          - mémorisation par RFID ou empreinte de bobine ;
          - correspondance verrouillée dès `RUNNING` ;
          - migration automatique des données 1.3 sans perte.

          ### Installation

          1. Téléchargez `AMS-Lite-Companion-1.4.0-macOS.zip`.
          2. Quittez Companion et Bambu Studio.
          3. Remplacez l’application dans `/Applications`.
          4. Effectuez un clic droit puis choisissez **Ouvrir**.
          5. Vérifiez les bobines détectées dans la carte Passerelle avant une petite impression.

          Il s’agit d’une préversion. La stable v1.3.0 reste disponible.

          Projet communautaire non officiel, sans affiliation avec Bambu Lab.
          EOF
